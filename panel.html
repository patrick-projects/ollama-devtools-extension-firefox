<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local LLM</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Local Pentest LLM</h1>
        <p>Use only on authorized targets.</p>
      </header>

      <section class="controls">
        <label for="model">Model</label>
        <select id="model">
          <option value="gemma4:e4b" selected>gemma4:e4b (faster)</option>
          <option value="gemma4:26b">gemma4:26b (higher quality)</option>
        </select>

        <label for="includeContext" class="checkbox">
          <input id="includeContext" type="checkbox" checked />
          Include page context
        </label>

        <label for="autoRun" class="checkbox">
          <input id="autoRun" type="checkbox" checked />
          Auto-run first JS snippet
        </label>

        <label for="directMode" class="checkbox">
          <input id="directMode" type="checkbox" checked />
          Modify page directly (prefer actions over code output)
        </label>
      </section>

      <section>
        <label for="prompt">Prompt</label>
        <textarea
          id="prompt"
          placeholder="Example: Give me a console snippet to disable client-side validation on this page."
        ></textarea>
      </section>

      <section class="buttons">
        <button id="sendBtn">Send</button>
        <button id="runBtn" disabled>Run Last JS Snippet</button>
        <button id="undoBtn" disabled>Undo Last Change</button>
      </section>

      <section>
        <label for="response">Response</label>
        <pre id="response"></pre>
      </section>

      <section id="status"></section>
    </main>

    <script src="panel.js"></script>
  </body>
</html>
